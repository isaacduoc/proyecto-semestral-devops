name: Docker CI/CD

on:
  push:
    branches:
      - deploy

jobs:
  build_push_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Frontend
        run: docker build -t isvvc22/frontend-devops ./front_despacho

      - name: Push Frontend
        run: docker push isvvc22/frontend-devops

      - name: Build Backend Despacho
        run: docker build -t isvvc22/backend-despacho-devops ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO

      - name: Push Backend Despacho
        run: docker push isvvc22/backend-despacho-devops

      - name: Build Backend Ventas
        run: docker build -t isvvc22/backend-ventas-devops ./back-Ventas_SpringBoot/Springboot-API-REST

      - name: Push Backend Ventas
        run: docker push isvvc22/backend-ventas-devops

      - name: Deploy en EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~/proyecto-semestral-devops/"proyecto semestral"
          git pull origin deploy
          docker compose pull
          docker compose down
          docker compose up -d
          docker image prune -f