name: Docker CI/CD

on:
  push:
    branches:
      - main

jobs:

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Frontend
        run: |
          docker build -t isvvc22/frontend-devops ./front_despacho

      - name: Push Frontend
        run: |
          docker push isvvc22/frontend-devops

  backend_despacho:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Despacho
        run: |
          docker build -t isvvc22/backend-despacho-devops ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO

      - name: Push Backend Despacho
        run: |
          docker push isvvc22/backend-despacho-devops

  backend_ventas:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Ventas
        run: |
          docker build -t isvvc22/backend-ventas-devops ./back-Ventas_SpringBoot/Springboot-API-REST

      - name: Push Backend Ventas
        run: |
          docker push isvvc22/backend-ventas-devops